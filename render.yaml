services:
  - type: web
    name: sao-khue-web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install && PORT=10000 BASE_PATH=/ pnpm --filter @workspace/sao-khue run build && pnpm --filter @workspace/api-server run build
    preDeployCommand: pnpm --filter @workspace/db run push
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sao-khue-db
          property: connectionString
      - key: BASE_PATH
        value: /
      - key: NODE_ENV
        value: production
      - key: REPL_ID
        sync: false
      - key: ADMIN_USER_IDS
        sync: false

databases:
  - name: sao-khue-db
    plan: free
